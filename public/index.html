<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WireRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div class="logo-sub">Instant private chat rooms</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Username</label>
        <input id="username-input" type="text" placeholder="pick a handle..." maxlength="20" autocomplete="off" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password-input" type="password" placeholder="your password..." autocomplete="off" />
      </div>
      <button id="login-btn" class="btn btn-primary">Connect →</button>
      <div class="login-hint">New username? We'll create your account automatically.</div>
      <div id="login-error" class="msg-error"></div>
      <div id="timeout-display"></div>
      <div id="login-info" class="msg-info"></div>
    </div>
  </div>

  <!-- Room selection screen -->
  <div id="room-screen" class="screen">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div id="room-welcome" class="logo-sub"></div>
      </div>
      <div class="divider"></div>
      <div class="btn-row">
        <button id="create-room-btn" class="btn btn-primary">+ New Room</button>
        <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
      </div>
    </div>
  </div>

  <!-- Join room screen -->
  <div id="join-screen" class="screen">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div class="logo-sub">Enter a room code</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Room Code</label>
        <input id="room-code-input" type="text" placeholder="8-character code..." maxlength="8" autocomplete="off" />
      </div>
      <button id="submit-room-btn" class="btn btn-primary">Join Room →</button>
      <div id="join-error" class="msg-error"></div>
      <button id="back-btn" class="btn-ghost">← back</button>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen" class="screen">
    <div id="chat-topbar">
      <div id="chat-topbar-left">
        <div class="logo">WireRoom</div>
        <div id="topbar-divider"></div>
        <div id="room-badge">
          <span id="room-badge-label">room</span>
          <span id="room-badge-code"></span>
          <span id="room-badge-copy">⎘ copy</span>
        </div>
      </div>
      <div id="chat-topbar-right">
        <button id="leave-btn">← Leave</button>
      </div>
    </div>

    <div id="chat-layout">
      <div id="chat-main">
        <div id="chat-body"></div>
        <div id="typing-bar">
          <div class="typing-dots" id="typing-dots" style="display:none">
            <span></span><span></span><span></span>
          </div>
          <span id="typing-text"></span>
        </div>
        <div id="chat-inputbar">
          <input id="msg" type="text" placeholder="send a message..." autocomplete="off" />
          <button id="send-btn">Send ↑</button>
        </div>
      </div>

      <div id="participants-sidebar">
        <div id="sidebar-header">
          <span id="sidebar-title">Participants</span>
          <span id="participant-count">0</span>
        </div>
        <div id="participant-list"></div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu">
    <div class="context-item" id="ctx-make-host">♛ Make Host</div>
    <div class="context-item danger" id="ctx-kick">✕ Kick</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
