<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WireRoom</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0c0d14;
    --surface:     #12131f;
    --surface2:    #1a1b2e;
    --border:      #252640;
    --accent:      #6c63ff;
    --accent2:     #a78bfa;
    --accent-glow: rgba(108, 99, 255, 0.25);
    --text:        #e8e9f5;
    --text-muted:  #7b7d9e;
    --error:       #ff6b8a;
    --gold:        #f0c040;
    --radius:      12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
    bottom: -150px; right: -150px;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  #login-screen, #room-screen, #join-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 400px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.06);
    animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  input[type="text"],
  input[type="password"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input:disabled { opacity: 0.4; cursor: not-allowed; }
  input::placeholder { color: var(--text-muted); }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 13px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(108,99,255,0.5); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }

  .btn-ghost {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 8px 0;
    cursor: pointer;
    transition: color 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .btn-row { display: flex; gap: 12px; }
  .btn-row .btn { flex: 1; }

  .msg-error { color: var(--error); font-size: 0.78rem; min-height: 1.1em; text-align: center; }
  .msg-info  { color: var(--text-muted); font-size: 0.78rem; min-height: 1.1em; text-align: center; }
  .divider   { height: 1px; background: var(--border); margin: 4px 0; }

  .login-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen { flex-direction: column; height: 100vh; overflow: hidden; }

  #chat-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    z-index: 2;
  }

  #chat-topbar-left { display: flex; align-items: center; gap: 16px; }
  #chat-topbar .logo { font-size: 1.2rem; margin: 0; }
  #topbar-divider { width: 1px; height: 20px; background: var(--border); }

  #room-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }
  #room-badge:hover { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  #room-badge-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  #room-badge-code  { font-size: 0.85rem; color: var(--accent2); font-weight: 500; letter-spacing: 0.05em; }
  #room-badge-copy  { font-size: 0.65rem; color: var(--text-muted); transition: color 0.15s; }
  #room-badge:hover #room-badge-copy { color: var(--accent2); }

  #chat-topbar-right { display: flex; align-items: center; gap: 12px; }

  #leave-btn {
    background: rgba(255,107,138,0.08);
    border: 1px solid rgba(255,107,138,0.2);
    color: var(--error);
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  #leave-btn:hover { background: rgba(255,107,138,0.15); border-color: rgba(255,107,138,0.4); }

  #chat-layout { display: flex; flex: 1; overflow: hidden; }
  #chat-main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  #chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  #chat-body::-webkit-scrollbar { width: 4px; }
  #chat-body::-webkit-scrollbar-track { background: transparent; }
  #chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── SIDEBAR ── */
  #participants-sidebar {
    width: 220px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #sidebar-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); }

  #participant-count {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    border-radius: 20px;
    padding: 2px 8px;
  }

  #participant-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #participant-list::-webkit-scrollbar { width: 3px; }
  #participant-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .participant-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    transition: background 0.15s;
    animation: participantIn 0.25s ease;
    cursor: default;
  }

  .participant-item.can-manage { cursor: pointer; }
  .participant-item.can-manage:hover { background: var(--surface2); }

  @keyframes participantIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .participant-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .participant-avatar.is-host {
    background: linear-gradient(135deg, #f0c040, #e07b20);
    box-shadow: 0 0 10px rgba(240,192,64,0.3);
  }

  .participant-name {
    font-size: 0.82rem;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .participant-name.is-you { color: var(--accent2); }

  .participant-tag { font-size: 0.6rem; color: var(--text-muted); flex-shrink: 0; }
  .participant-tag.host-tag { color: var(--gold); }

  /* ── CONTEXT MENU ── */
  #context-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    z-index: 100;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    gap: 2px;
    animation: menuIn 0.15s ease;
  }
  #context-menu.visible { display: flex; }

  @keyframes menuIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .context-item {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--text);
    transition: background 0.12s;
    font-family: 'DM Mono', monospace;
  }
  .context-item:hover { background: var(--surface2); }
  .context-item.danger { color: var(--error); }
  .context-item.danger:hover { background: rgba(255,107,138,0.1); }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.self   { align-self: flex-end; }
  .msg.other  { align-self: flex-start; }
  .msg.system { align-self: center; max-width: 100%; }

  .msg-meta { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 3px; letter-spacing: 0.03em; }
  .msg.self .msg-meta { text-align: right; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg.self .msg-bubble {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.other .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.system .msg-bubble {
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    text-align: center;
  }

  /* ── TYPING ── */
  #typing-bar {
    height: 22px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #typing-text {
    font-size: 0.72rem;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #typing-text.visible { opacity: 1; }

  .typing-dots { display: flex; gap: 3px; align-items: center; }
  .typing-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent2);
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-4px); opacity: 1; }
  }

  /* ── INPUT BAR ── */
  #chat-inputbar {
    padding: 12px 24px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }

  #msg {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #msg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #msg::placeholder { color: var(--text-muted); }

  #send-btn {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 16px rgba(108,99,255,0.3);
    white-space: nowrap;
  }
  #send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,99,255,0.45); }
  #send-btn:active { transform: translateY(0); }

  #timeout-display {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.05em;
    margin-top: -8px;
  }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="screen active">
  <div class="card">
    <div>
      <div class="logo">WireRoom</div>
      <div class="logo-sub">Instant private chat rooms</div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Username</label>
      <input id="username-input" type="text" placeholder="Username" maxlength="20" autocomplete="off" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password-input" type="password" placeholder="Password" autocomplete="off" />
    </div>
    <button id="login-btn" class="btn btn-primary">Connect →</button>
    <div class="login-hint">New user? We'll create your account automatically.</div>
    <div id="login-error" class="msg-error"></div>
    <div id="timeout-display"></div>
    <div id="login-info" class="msg-info"></div>
  </div>
</div>

<!-- Room selection screen -->
<div id="room-screen" class="screen">
  <div class="card">
    <div>
      <div class="logo">WireRoom</div>
      <div id="room-welcome" class="logo-sub"></div>
    </div>
    <div class="divider"></div>
    <div class="btn-row">
      <button id="create-room-btn" class="btn btn-primary">+ New Room</button>
      <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
    </div>
  </div>
</div>

<!-- Join room screen -->
<div id="join-screen" class="screen">
  <div class="card">
    <div>
      <div class="logo">WireRoom</div>
      <div class="logo-sub">Enter a room code</div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Room Code</label>
      <input id="room-code-input" type="text" placeholder="8-character code..." maxlength="8" autocomplete="off" />
    </div>
    <button id="submit-room-btn" class="btn btn-primary">Join Room →</button>
    <div id="join-error" class="msg-error"></div>
    <button id="back-btn" class="btn-ghost">← back</button>
  </div>
</div>

<!-- Chat screen -->
<div id="chat-screen" class="screen">
  <div id="chat-topbar">
    <div id="chat-topbar-left">
      <div class="logo">WireRoom</div>
      <div id="topbar-divider"></div>
      <div id="room-badge">
        <span id="room-badge-label">room</span>
        <span id="room-badge-code"></span>
        <span id="room-badge-copy">⎘ copy</span>
      </div>
    </div>
    <div id="chat-topbar-right">
      <button id="leave-btn">← Leave</button>
    </div>
  </div>

  <div id="chat-layout">
    <div id="chat-main">
      <div id="chat-body"></div>
      <div id="typing-bar">
        <div class="typing-dots" id="typing-dots" style="display:none">
          <span></span><span></span><span></span>
        </div>
        <span id="typing-text"></span>
      </div>
      <div id="chat-inputbar">
        <input id="msg" type="text" placeholder="send a message..." autocomplete="off" />
        <button id="send-btn">Send ↑</button>
      </div>
    </div>

    <div id="participants-sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">Participants</span>
        <span id="participant-count">0</span>
      </div>
      <div id="participant-list"></div>
    </div>
  </div>
</div>

<!-- Context menu -->
<div id="context-menu">
  <div class="context-item" id="ctx-make-host">♛ Make Host</div>
  <div class="context-item danger" id="ctx-kick">✕ Kick</div>
</div>

<script>
  const MAX_ATTEMPTS   = 5;
  const TIMEOUT_MS     = 2 * 60 * 1000;
  const TYPING_IDLE_MS = 2000;

  const loginScreen    = document.getElementById("login-screen");
  const roomScreen     = document.getElementById("room-screen");
  const joinScreen     = document.getElementById("join-screen");
  const chatScreen     = document.getElementById("chat-screen");
  const allScreens     = [loginScreen, roomScreen, joinScreen, chatScreen];

  const usernameInput  = document.getElementById("username-input");
  const passwordInput  = document.getElementById("password-input");
  const loginBtn       = document.getElementById("login-btn");
  const loginError     = document.getElementById("login-error");
  const loginInfo      = document.getElementById("login-info");
  const timeoutDisplay = document.getElementById("timeout-display");

  const roomWelcome    = document.getElementById("room-welcome");
  const createRoomBtn  = document.getElementById("create-room-btn");
  const joinRoomBtn    = document.getElementById("join-room-btn");

  const roomCodeInput  = document.getElementById("room-code-input");
  const submitRoomBtn  = document.getElementById("submit-room-btn");
  const joinError      = document.getElementById("join-error");
  const backBtn        = document.getElementById("back-btn");

  const roomBadge      = document.getElementById("room-badge");
  const roomBadgeCode  = document.getElementById("room-badge-code");
  const roomBadgeCopy  = document.getElementById("room-badge-copy");
  const chatBody       = document.getElementById("chat-body");
  const msgInput       = document.getElementById("msg");
  const sendBtn        = document.getElementById("send-btn");
  const leaveBtn       = document.getElementById("leave-btn");

  const typingDots       = document.getElementById("typing-dots");
  const typingText       = document.getElementById("typing-text");
  const participantList  = document.getElementById("participant-list");
  const participantCount = document.getElementById("participant-count");

  const contextMenu    = document.getElementById("context-menu");
  const ctxMakeHost    = document.getElementById("ctx-make-host");
  const ctxKick        = document.getElementById("ctx-kick");

  let ws;
  let attempts        = 0;
  let timedOut        = false;
  let currentRoomCode = "";
  let currentUser     = "";
  let currentHost     = "";
  let contextTarget   = "";

  const typingUsers   = new Set();
  let typingIdleTimer = null;
  let isSelfTyping    = false;
  let lastParticipants = [];

  function showScreen(screen) {
    allScreens.forEach(s => s.classList.remove("active"));
    screen.classList.add("active");
  }

  function isHost() { return currentUser.toLowerCase() === currentHost.toLowerCase(); }

  // ---- WebSocket ----
  function connectWS() {
    const protocol = location.protocol === "https:" ? "wss://" : "ws://";
    ws = new WebSocket(protocol + location.host + "/ws");

    ws.onopen = () => setLoginEnabled(true);

    ws.onmessage = (e) => {
      const m = JSON.parse(e.data);
      switch (m.type) {

        case "error":
          if (joinScreen.classList.contains("active")) {
            joinError.textContent  = m.content;
            submitRoomBtn.disabled = false;
            roomCodeInput.disabled = false;
            roomCodeInput.focus();
          } else {
            attempts++;
            const remaining = MAX_ATTEMPTS - attempts;
            if (remaining <= 0) { startTimeout(); return; }
            loginError.textContent = m.content + ` (${remaining} left)`;
            setLoginEnabled(true);
          }
          break;

        case "join_ok":
          attempts = 0;
          currentUser = usernameInput.value.trim();
          roomWelcome.textContent = `connected as ${currentUser}`;
          showScreen(roomScreen);
          break;

        case "room_created":
        case "room_joined":
          enterChat(m.content);
          break;

        case "system":
          appendSystem(m.content);
          break;

        case "message":
          typingUsers.delete(m.user);
          updateTypingIndicator();
          appendMessage(m.user, m.content, false);
          break;

        case "typing":
          if (m.content === "start") typingUsers.add(m.user);
          else typingUsers.delete(m.user);
          updateTypingIndicator();
          break;

        case "room_members":
          updateParticipants(m.users);
          break;

        case "host_changed":
          currentHost = m.user;
          updateParticipants(null);
          appendSystem(`♛ ${m.user} is now the host`);
          break;

        case "kicked":
          ws.close();
          currentRoomCode = ""; currentUser = ""; currentHost = "";
          loginError.textContent = "you were kicked from the room.";
          passwordInput.value = "";
          showScreen(loginScreen);
          connectWS();
          break;

        case "username_taken_in_room":
          loginError.textContent = m.content + " — try a different handle.";
          usernameInput.value = "";
          passwordInput.value = "";
          showScreen(loginScreen);
          setLoginEnabled(true);
          break;
      }
    };

    ws.onclose = () => {
      if (timedOut) return;
      if (chatScreen.classList.contains("active")) {
        appendSystem("disconnected from server.");
      }
    };
  }

  // ---- Participants ----
  function updateParticipants(users) {
    if (users !== null) lastParticipants = users;
    const list = lastParticipants;

    participantCount.textContent = list.length;
    participantList.innerHTML = "";

    list.forEach(name => {
      const isSelf     = name.toLowerCase() === currentUser.toLowerCase();
      const isHostUser = name.toLowerCase() === currentHost.toLowerCase();
      const canManage  = isHost() && !isSelf;

      const item = document.createElement("div");
      item.className = "participant-item" + (canManage ? " can-manage" : "");
      item.dataset.username = name;

      const avatar = document.createElement("div");
      avatar.className = "participant-avatar" + (isHostUser ? " is-host" : "");
      avatar.textContent = name[0];

      const nameEl = document.createElement("div");
      nameEl.className = "participant-name" + (isSelf ? " is-you" : "");
      nameEl.textContent = name;

      item.appendChild(avatar);
      item.appendChild(nameEl);

      if (isHostUser) {
        const tag = document.createElement("span");
        tag.className = "participant-tag host-tag";
        tag.textContent = "♛";
        item.appendChild(tag);
      } else if (isSelf) {
        const tag = document.createElement("span");
        tag.className = "participant-tag";
        tag.textContent = "you";
        item.appendChild(tag);
      }

      if (canManage) {
        item.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          contextTarget = name;
          showContextMenu(e.clientX, e.clientY);
        });
      }

      participantList.appendChild(item);
    });
  }

  // ---- Context menu ----
  function showContextMenu(x, y) {
    contextMenu.classList.add("visible");
    const menuW = 160, menuH = 80;
    const left = Math.min(x, window.innerWidth  - menuW - 8);
    const top  = Math.min(y, window.innerHeight - menuH - 8);
    contextMenu.style.left = left + "px";
    contextMenu.style.top  = top  + "px";
  }

  function hideContextMenu() {
    contextMenu.classList.remove("visible");
    contextTarget = "";
  }

  ctxMakeHost.addEventListener("click", () => {
    if (contextTarget) ws.send(JSON.stringify({ type: "transfer_host", target: contextTarget }));
    hideContextMenu();
  });

  ctxKick.addEventListener("click", () => {
    if (contextTarget) ws.send(JSON.stringify({ type: "kick", target: contextTarget }));
    hideContextMenu();
  });

  document.addEventListener("click", (e) => { if (!contextMenu.contains(e.target)) hideContextMenu(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") hideContextMenu(); });

  // ---- Typing ----
  function updateTypingIndicator() {
    const users = [...typingUsers];
    if (users.length === 0) {
      typingText.classList.remove("visible");
      typingDots.style.display = "none";
      typingText.textContent = "";
      return;
    }
    typingDots.style.display = "flex";
    typingText.classList.add("visible");
    if (users.length === 1) {
      typingText.textContent = `${users[0]} is typing...`;
    } else if (users.length === 2) {
      typingText.textContent = `${users[0]} and ${users[1]} are typing...`;
    } else {
      typingText.textContent = `${users[0]}, ${users[1]} and ${users.length - 2} more are typing...`;
    }
  }

  function sendTypingStart() {
    if (!isSelfTyping && ws && ws.readyState === WebSocket.OPEN) {
      isSelfTyping = true;
      ws.send(JSON.stringify({ type: "typing", content: "start" }));
    }
  }

  function sendTypingStop() {
    if (isSelfTyping && ws && ws.readyState === WebSocket.OPEN) {
      isSelfTyping = false;
      ws.send(JSON.stringify({ type: "typing", content: "stop" }));
    }
  }

  msgInput.addEventListener("input", () => {
    if (msgInput.value.trim() === "") { sendTypingStop(); clearTimeout(typingIdleTimer); return; }
    sendTypingStart();
    clearTimeout(typingIdleTimer);
    typingIdleTimer = setTimeout(sendTypingStop, TYPING_IDLE_MS);
  });

  // ---- Login ----
  function tryLogin() {
    const name = usernameInput.value.trim();
    const pass = passwordInput.value;
    if (!name) { loginError.textContent = "please enter a username."; return; }
    if (!pass)  { loginError.textContent = "please enter a password."; return; }
    loginError.textContent = "";
    setLoginEnabled(false);
    ws.send(JSON.stringify({ type: "join", user: name, content: pass }));
  }

  function setLoginEnabled(enabled) {
    usernameInput.disabled = !enabled;
    passwordInput.disabled = !enabled;
    loginBtn.disabled       = !enabled;
    if (enabled) usernameInput.focus();
  }

  function startTimeout() {
    timedOut = true;
    ws.close();
    setLoginEnabled(false);
    loginError.textContent = "too many failed attempts.";
    let secondsLeft = TIMEOUT_MS / 1000;
    updateTimeout(secondsLeft);
    const interval = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) { clearInterval(interval); resetAfterTimeout(); }
      else updateTimeout(secondsLeft);
    }, 1000);
  }

  function updateTimeout(s) {
    const m   = Math.floor(s / 60).toString().padStart(2, "0");
    const sec = (s % 60).toString().padStart(2, "0");
    timeoutDisplay.textContent = `${m}:${sec}`;
    loginInfo.textContent = "try again after cooldown";
  }

  function resetAfterTimeout() {
    timedOut = false; attempts = 0;
    loginError.textContent = ""; loginInfo.textContent = "you can try again now.";
    timeoutDisplay.textContent = ""; usernameInput.value = ""; passwordInput.value = "";
    connectWS();
  }

  // ---- Room selection ----
  createRoomBtn.addEventListener("click", () => ws.send(JSON.stringify({ type: "create_room" })));

  joinRoomBtn.addEventListener("click", () => {
    joinError.textContent = ""; roomCodeInput.value = "";
    showScreen(joinScreen); roomCodeInput.focus();
  });

  backBtn.addEventListener("click", () => showScreen(roomScreen));

  function tryJoinRoom() {
    const code = roomCodeInput.value.trim().toUpperCase();
    if (!code) { joinError.textContent = "please enter a room code."; return; }
    joinError.textContent = ""; submitRoomBtn.disabled = true; roomCodeInput.disabled = true;
    ws.send(JSON.stringify({ type: "join_room", content: code }));
  }

  submitRoomBtn.addEventListener("click", tryJoinRoom);
  roomCodeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryJoinRoom(); });

  // ---- Enter chat ----
  function enterChat(roomCode) {
    currentRoomCode = roomCode;
    chatBody.innerHTML = "";
    typingUsers.clear();
    updateTypingIndicator();
    lastParticipants = [];
    participantList.innerHTML = "";
    participantCount.textContent = "0";
    roomBadgeCode.textContent = roomCode;
    showScreen(chatScreen);
    msgInput.focus();
  }

  roomBadge.addEventListener("click", () => {
    navigator.clipboard.writeText(currentRoomCode);
    roomBadgeCopy.textContent = "✓ copied";
    setTimeout(() => { roomBadgeCopy.textContent = "⎘ copy"; }, 1800);
  });

  // ---- Leave ----
  leaveBtn.addEventListener("click", () => {
    sendTypingStop();
    ws.close();
    attempts = 0; currentRoomCode = ""; currentUser = ""; currentHost = "";
    usernameInput.value = ""; passwordInput.value = ""; loginError.textContent = "";
    showScreen(loginScreen);
    connectWS();
  });

  // ---- Chat ----
  function send() {
    const content = msgInput.value.trim();
    if (!content) return;
    clearTimeout(typingIdleTimer);
    sendTypingStop();
    appendMessage("You", content, true);
    ws.send(JSON.stringify({ type: "message", content }));
    msgInput.value = "";
  }

  function appendMessage(user, content, isSelf) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg " + (isSelf ? "self" : "other");
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.textContent = isSelf ? "you" : user;
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = content;
    wrapper.appendChild(meta);
    wrapper.appendChild(bubble);
    chatBody.appendChild(wrapper);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function appendSystem(text) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg system";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    chatBody.appendChild(wrapper);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  sendBtn.addEventListener("click", send);
  msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  loginBtn.addEventListener("click", tryLogin);
  usernameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(); });
  passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(); });

  setLoginEnabled(false);
  connectWS();
</script>
</body>
</html>
