<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WireRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://unpkg.com/picmo@5.8.5/dist/umd/index.js"></script>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div class="logo-sub">Instant private chat rooms</div>
      </div>
      <div class="divider"></div>

      <!-- OAuth buttons -->
      <a href="/auth/google" class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96l3.007 2.332C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </a>

      <a href="/auth/github" class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text)">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Continue with GitHub
      </a>

      <div class="oauth-divider">or sign in with password</div>

      <div class="field">
        <label>Username</label>
        <input id="username-input" type="text" placeholder="pick a handle..." maxlength="20" autocomplete="off" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password-input" type="password" placeholder="your password..." autocomplete="off" />
      </div>
      <button id="login-btn" class="btn btn-primary">Connect →</button>
      <div class="login-hint">New username? We'll create your account automatically.</div>
      <div id="login-error" class="msg-error"></div>
      <div id="timeout-display"></div>
      <div id="login-info" class="msg-info"></div>
    </div>
  </div>

  <!-- Pick username screen (after OAuth) -->
  <div id="pick-username-screen" class="screen">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div class="logo-sub">One last thing</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Choose a username</label>
        <input id="pick-username-input" type="text" placeholder="letters, digits, _ or -" maxlength="20" autocomplete="off" />
      </div>
      <button id="pick-username-btn" class="btn btn-primary">Set Username →</button>
      <div id="pick-username-error" class="msg-error"></div>
    </div>
  </div>

  <!-- Room selection screen -->
  <div id="room-screen" class="screen">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div id="room-welcome" class="logo-sub"></div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Room Password <span class="field-hint">(optional)</span></label>
        <input id="room-password-input" type="password" placeholder="leave empty for open room..." maxlength="50" autocomplete="off" />
      </div>
      <div class="btn-row">
        <button id="create-room-btn" class="btn btn-primary">+ New Room</button>
        <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
      </div>
    </div>
  </div>

  <!-- Join room screen -->
  <div id="join-screen" class="screen">
    <div class="card">
      <div>
        <div class="logo">WireRoom</div>
        <div class="logo-sub">Enter a room code</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Room Code</label>
        <input id="room-code-input" type="text" placeholder="8-character code..." maxlength="8" autocomplete="off" />
      </div>
      <div id="join-password-field" class="field" style="display:none">
        <label>Room Password</label>
        <input id="join-password-input" type="password" placeholder="this room is locked..." maxlength="50" autocomplete="off" />
      </div>
      <button id="submit-room-btn" class="btn btn-primary">Join Room →</button>
      <div id="join-error" class="msg-error"></div>
      <button id="back-btn" class="btn-ghost">← back</button>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen" class="screen">
    <div id="chat-topbar">
      <div id="chat-topbar-left">
        <div class="logo">WireRoom</div>
        <div id="topbar-divider"></div>
        <div id="room-badge">
          <span id="room-badge-label">room</span>
          <span id="room-badge-code"></span>
          <span id="room-badge-copy">⎘ copy</span>
        </div>
      </div>
      <div id="chat-topbar-right">
        <button id="leave-btn">← Leave</button>
      </div>
    </div>

    <div id="chat-layout">
      <div id="chat-main">
        <div id="chat-body"></div>
        <div id="typing-bar">
          <div class="typing-dots" id="typing-dots" style="display:none">
            <span></span><span></span><span></span>
          </div>
          <span id="typing-text"></span>
        </div>
        <div id="chat-inputbar">
          <div id="reply-preview">
            <span id="reply-preview-text"></span>
            <button id="reply-preview-close">✕</button>
          </div>
          <input id="msg" type="text" placeholder="send a message..." autocomplete="off" />
          <div id="emoji-btn-wrapper">
            <button id="emoji-btn" type="button">😀</button>
            <div id="emoji-picker-container"></div>
          </div>
          <button id="send-btn">Send ↑</button>
        </div>
      </div>

      <div id="participants-sidebar">
        <div id="sidebar-header">
          <span id="sidebar-title">Participants</span>
          <span id="participant-count">0</span>
        </div>
        <div id="participant-list"></div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu">
    <div class="context-item" id="ctx-make-host">♛ Make Host</div>
    <div class="context-item danger" id="ctx-kick">✕ Kick</div>
  </div>

  <div id="react-picker-container"></div>

  <script src="/app.js"></script>
</body>
</html>
